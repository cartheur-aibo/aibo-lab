<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>R-Code Behavior Diagram: PlaySound</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101418;
      --fg: #e6edf3;
      --muted: #94a3b8;
      --panel: #161b22;
      --border: #30363d;
    }
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .mermaid {
      overflow: auto;
    }
    p {
      color: var(--muted);
    }
    code {
      color: var(--fg);
    }
  </style>
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: true, theme: "dark" });
  </script>
</head>
<body>
  <main>
    <h1>R-Code Behavior Diagram: PlaySound</h1>
    <p>This diagram shows 2 extracted states and 1 transition. It includes Boot, Assume Safe Pose, Act, Synchronize blocks.</p>
    <div class="panel">
      <pre class="mermaid">flowchart TD
    S_INIT[&quot;Boot / Safe Pose&quot;]
    S_100[&quot;Synchronize&quot;]
    S_INIT --&gt;|entry| S_100
</pre>
    </div>
  </main>
</body>
</html>
